<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mind Refresh 💭</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand fw-bold" href="#">🌿 Mind Refresh</a>

    <button class="btn btn-outline-light" onclick="toggleDark()">
      🌙
    </button>
  </div>
</nav>

<!-- Hero Section -->
<div class="hero d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 class="text-white fw-bold">Mind Refresh 🌿</h1>
    <p class="text-light">Relax your mind. Share your thoughts.</p>
  </div>
</div>

<!-- Main Section -->
<div class="container mt-5">

  <div class="text-center mb-4">
    <h2>Relax. Write. Express 💛</h2>
    <p class="text-muted">A space to share your thoughts freely</p>
  </div>

  <!-- Input Card -->
  <div class="card p-4 shadow-lg mb-4">
    <textarea id="postInput" class="form-control mb-3" rows="3" placeholder="What's on your mind?"></textarea>
    <button class="btn btn-primary w-100 fw-semibold" onclick="addPost()">Post Thought ✨</button>
  </div>

  <!-- Posts -->
  <div id="posts"></div>

</div>

<!-- Footer -->
<footer class="text-center mt-5 mb-3 text-muted">
  <small>✨ Your safe space for thoughts</small>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="script.js"></script>
</body>
</html>
